name: Close pull requests

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

# This repository is a read-only split mirror of https://github.com/jeffersongoncalves/laravel-erp.
# Pull requests are closed automatically; development happens in the monorepo.
jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = 'This repository is a **read-only split mirror**. Development happens in the monorepo — please open your pull request at https://github.com/jeffersongoncalves/laravel-erp. Closing automatically.';
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.pull_request.number, body });
            await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.payload.pull_request.number, state: 'closed' });
